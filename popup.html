<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Virgo Ad Blocker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Vibrant mesh gradient theme */
      --bg-color: #0b0c10;
      --glass-bg: rgba(20, 21, 26, 0.65);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      
      --accent: #6C5CE7;
      --accent-grad: linear-gradient(135deg, #6C5CE7 0%, #00CEC9 100%);
      --accent-glow: rgba(108, 92, 231, 0.4);
      --text: #ffffff;
      --text-muted: #a0a5b5;
      --danger: #FF7675;
      --warn: #FDCB6E;
      
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 350px;
      min-height: 480px;
      background-color: var(--bg-color);
      /* Mesh gradient background */
      background-image: 
        radial-gradient(at 0% 0%, rgba(108, 92, 231, 0.25) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(0, 206, 201, 0.2) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(108, 92, 231, 0.2) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(20, 21, 26, 1) 0px, transparent 50%);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Glass utility */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--glass-shadow);
    }

    /* ── Header ── */
    .header {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--glass-border);
      background: rgba(11, 12, 16, 0.4);
      backdrop-filter: blur(10px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent-grad);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 15px var(--accent-glow);
    }

    .logo-name {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.03em;
      background: var(--accent-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    /* ── Master Toggle ── */
    .master-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .toggle-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      transition: color 0.3s;
    }

    .switch {
      position: relative;
      width: 48px;
      height: 26px;
    }

    .switch input { opacity: 0; width: 0; height: 0; position: absolute; }

    .slider {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 26px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
      border: 1px solid var(--glass-border);
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    input:checked + .slider {
      background: var(--accent-grad);
      border-color: transparent;
    }

    input:checked + .slider::before {
      transform: translateX(22px);
      background: #ffffff;
      box-shadow: 0 0 10px rgba(255,255,255,0.8);
    }

    /* ── Content Area ── */
    .content {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    /* ── Stats Panel ── */
    .stats {
      display: flex;
      gap: 12px;
    }

    .stat-card {
      flex: 1;
      padding: 16px 12px;
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .stat-number {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 10px var(--accent-glow);
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ── Domain Status ── */
    .domain-bar {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .domain-info {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .domain-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #00cec9;
      flex-shrink: 0;
      box-shadow: 0 0 8px #00cec9;
    }

    .domain-dot.whitelisted {
      background: var(--warn);
      box-shadow: 0 0 8px rgba(253, 203, 110, 0.6);
    }

    .domain-name {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.9;
    }

    .whitelist-btn {
      font-size: 11px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .whitelist-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-1px);
    }

    .whitelist-btn.active {
      border-color: var(--warn);
      color: var(--warn);
      background: rgba(253, 203, 110, 0.1);
    }

    /* ── Options Section ── */
    .options {
      display: flex;
      flex-direction: column;
    }

    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      transition: background 0.2s;
    }

    .option-row:first-child { border-radius: var(--radius) var(--radius) 0 0; }
    .option-row:last-child { border-radius: 0 0 var(--radius) var(--radius); }

    .option-row:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .option-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .option-icon {
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
    }

    .option-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .option-desc {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* Mini toggle */
    .mini-switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }

    .mini-switch input { opacity: 0; width: 0; height: 0; position: absolute;}

    .mini-slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 22px;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid var(--glass-border);
    }

    .mini-slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: all 0.3s;
    }

    input:checked + .mini-slider {
      background: var(--accent-grad);
      border-color: transparent;
    }

    input:checked + .mini-slider::before {
      transform: translateX(18px);
      background: #fff;
    }

    /* ── Footer ── */
    .footer {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(11, 12, 16, 0.8);
      border-top: 1px solid var(--glass-border);
    }

    .reset-btn {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      transition: color 0.2s;
    }

    .reset-btn:hover { color: var(--danger); }

    .version {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.7;
    }

    /* ── Disabled overlay ── */
    .disabled-overlay {
      position: absolute;
      inset: 0;
      background: rgba(11, 12, 16, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .disabled-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .disabled-msg {
      font-size: 18px;
      font-weight: 700;
      color: var(--danger);
      text-align: center;
      padding: 30px;
      border-radius: 20px;
      letter-spacing: 0.1em;
      box-shadow: 0 10px 30px rgba(255, 118, 117, 0.15);
      border: 1px solid rgba(255, 118, 117, 0.3);
    }

    /* Animations */
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
    .pulse {
      animation: pulse 2s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🛡</div>
      <div>
        <div class="logo-name">VIRGO</div>
        <div class="logo-sub">AD BLOCKER</div>
      </div>
    </div>
    <label class="master-toggle" title="Enable/Disable Virgo Ad Blocker">
      <span class="toggle-label" id="toggle-label">ON</span>
      <div class="switch">
        <input type="checkbox" id="master-toggle" checked />
        <span class="slider"></span>
      </div>
    </label>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="stats">
      <div class="stat-card glass">
        <div class="stat-number pulse" id="blocked-count">0</div>
        <div class="stat-label">Ads Blocked</div>
      </div>
      <div class="stat-card glass">
        <div class="stat-number" id="tracker-status">ON</div>
        <div class="stat-label">Trackers</div>
      </div>
      <div class="stat-card glass">
        <div class="stat-number" id="popup-status">ON</div>
        <div class="stat-label">Popups</div>
      </div>
    </div>

    <!-- Domain Bar -->
    <div class="domain-bar glass">
      <div class="domain-info">
        <div class="domain-dot" id="domain-dot"></div>
        <div class="domain-name" id="current-domain">Loading...</div>
      </div>
      <button class="whitelist-btn" id="whitelist-btn">Whitelist</button>
    </div>

    <!-- Options -->
    <div class="options glass">
      <div class="option-row" style="border-bottom: 1px solid var(--glass-border);">
        <div class="option-left">
          <span class="option-icon">🚫</span>
          <div>
            <div class="option-name">Block Ads</div>
            <div class="option-desc">Remove display & video ads</div>
          </div>
        </div>
        <label class="mini-switch">
          <input type="checkbox" id="block-ads" checked />
          <span class="mini-slider"></span>
        </label>
      </div>

      <div class="option-row" style="border-bottom: 1px solid var(--glass-border);">
        <div class="option-left">
          <span class="option-icon">👁</span>
          <div>
            <div class="option-name">Block Trackers</div>
            <div class="option-desc">Stop cross-site tracking</div>
          </div>
        </div>
        <label class="mini-switch">
          <input type="checkbox" id="block-trackers" checked />
          <span class="mini-slider"></span>
        </label>
      </div>

      <div class="option-row">
        <div class="option-left">
          <span class="option-icon">⬜</span>
          <div>
            <div class="option-name">Block Popups</div>
            <div class="option-desc">Prevent popup windows</div>
          </div>
        </div>
        <label class="mini-switch">
          <input type="checkbox" id="block-popups" checked />
          <span class="mini-slider"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="reset-btn" id="reset-btn">↺ Reset Counter</button>
    <span class="version">v1.0.0</span>
  </div>

  <!-- Disabled overlay -->
  <div class="disabled-overlay" id="disabled-overlay">
    <div class="disabled-msg glass">⚠ PROTECTION<br>SYSTEM OFFLINE</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
